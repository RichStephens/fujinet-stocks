name: CI

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        platform:
          # - adam
          - apple2
          - atari
          # - c64
          - coco
          - msdos

    container:
      image: fozztexx/defoogi:1.4.2

    steps:
      - uses: actions/checkout@v4

      - name: Fix git safe directory
        run: git config --global --add safe.directory "$GITHUB_WORKSPACE"

      - name: Install atari-tools (atr)
        if: matrix.platform == 'atari'
        run: |
          git clone --depth=1 https://github.com/jhallen/atari-tools /tmp/atari-tools
          cd /tmp/atari-tools && make && cp atr /usr/local/bin/

      - name: Install mtools (mformat, mcopy)
        if: matrix.platform == 'msdos'
        run: apt-get update && apt-get install -y mtools

      - name: Build
        run: make ${{ matrix.platform }}/r2r

      # PR case: normal artifact upload
      - name: Upload artifact for ${{ matrix.platform }}
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.platform }}
          path: r2r/${{ matrix.platform }}/**

  release:
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: r2r-all

      - name: Delete old "latest" release
        run: gh release delete latest --yes || true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Move "latest" tag to current commit
        run: |
          git tag -f latest
          git push origin -f latest

      - name: Generate release notes
        id: notes
        run: |
          PREV_TAG=$(git tag --sort=-creatordate | grep -v '^latest$' | head -1)
          if [ -n "$PREV_TAG" ]; then
            NOTES=$(git log "${PREV_TAG}..HEAD" --pretty=format:"- %s (%h)" --)
          else
            NOTES=$(git log --pretty=format:"- %s (%h)" --)
          fi
          echo "RELEASE_NOTES<<EOF" >> "$GITHUB_OUTPUT"
          echo "$NOTES" >> "$GITHUB_OUTPUT"
          echo "EOF" >> "$GITHUB_OUTPUT"

      - name: Create "latest" release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: latest
          body: ${{ steps.notes.outputs.RELEASE_NOTES }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload all platform artifacts as zips
        run: |
          SHORT_HASH=$(git rev-parse --short HEAD)
          TMP_DIR=$(mktemp -d)
          REPO_NAME=$(basename "${GITHUB_REPOSITORY}")
          for dir in r2r-all/* ; do
            PLATFORM=$(basename "${dir}")
            PLATFORM_ID="${REPO_NAME}-${PLATFORM}-${SHORT_HASH}"
            echo "Zipping ${PLATFORM}..."
            cp -r "${dir}" "${TMP_DIR}/${PLATFORM_ID}"
            ZIP_FILE="${PLATFORM_ID}.zip"
            (cd "${TMP_DIR}" && zip -r "${TMP_DIR}/${ZIP_FILE}" "${PLATFORM_ID}")
            echo "Uploading ${ZIP_FILE}..."
            gh release upload latest "${TMP_DIR}/${ZIP_FILE}" --clobber
          done
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
